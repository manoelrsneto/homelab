---
- name: Bootstrap docker-host
  hosts: docker_host
  become: true

  roles:
    - docker

  tasks:
    - name: Create /apps directory
      file:
        path: /apps
        state: directory
        mode: "0755"

    - name: Clone homelab repo
      git:
        repo: https://github.com/manoelrsneto/homelab.git
        dest: /apps/homelab
        update: true

    - name: Create homelab Docker network
      command: docker network create homelab
      register: network_result
      failed_when:
        - network_result.rc != 0
        - '"already exists" not in network_result.stderr'
      changed_when: network_result.rc == 0

    - name: Create /etc/homelab/monitoring directory
      file:
        path: /etc/homelab/monitoring
        state: directory
        mode: "0755"

    - name: Copy monitoring configs to host
      copy:
        src: "../../apps/monitoring/{{ item }}"
        dest: "/etc/homelab/monitoring/{{ item }}"
        mode: "0644"
      loop:
        - prometheus.yml
        - loki.yml
        - promtail.yml

    - name: Start Portainer
      command: docker compose up -d
      args:
        chdir: /apps/homelab/apps/portainer
