---
- name: Setup Docker host
  hosts: docker_host
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install dependencies
      apt:
        name:
          - curl
          - ca-certificates
          - gnupg
        state: present

    - name: Install Docker
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Install Docker Compose plugin
      apt:
        name: docker-compose-plugin
        state: present

    - name: Clone homelab repo
      git:
        repo: https://github.com/manoelrsneto/homelab.git
        dest: /apps/homelab
        update: yes