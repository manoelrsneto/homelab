name: Deploy Homelab

on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init
        working-directory: infra

      - name: Debug Proxmox vars
        run: |
          echo "URL length: ${#TF_VAR_proxmox_url}"
          echo "USER length: ${#TF_VAR_proxmox_user}"
          echo "PASS length: ${#TF_VAR_proxmox_password}"
        env:
          TF_VAR_proxmox_url: ${{ secrets.PROXMOX_URL }}
          TF_VAR_proxmox_user: ${{ secrets.PROXMOX_USER }}
          TF_VAR_proxmox_password: ${{ secrets.PROXMOX_PASSWORD }}

      - name: Terraform Plan
        run: terraform plan
        working-directory: infra
        env:
          TF_VAR_proxmox_url: ${{ secrets.PROXMOX_URL }}
          TF_VAR_proxmox_user: ${{ secrets.PROXMOX_USER }}
          TF_VAR_proxmox_password: ${{ secrets.PROXMOX_PASSWORD }}
          TF_VAR_gateway: ${{ secrets.GATEWAY }}
          TF_VAR_pihole_ip: ${{ secrets.PIHOLE_IP }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
        working-directory: infra
        env:
          TF_VAR_proxmox_url: ${{ secrets.PROXMOX_URL }}
          TF_VAR_proxmox_user: ${{ secrets.PROXMOX_USER }}
          TF_VAR_proxmox_password: ${{ secrets.PROXMOX_PASSWORD }}
          TF_VAR_gateway: ${{ secrets.GATEWAY }}
          TF_VAR_pihole_ip: ${{ secrets.PIHOLE_IP }}

  ansible:
    name: Ansible
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Install Ansible
        run: pip install ansible

      - name: Run Ansible Playbook
        run: ansible-playbook -i ansible/inventory/hosts.ini ansible/playbooks/docker.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"