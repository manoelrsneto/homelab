name: Deploy Homelab

on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init
        working-directory: infra

      - name: Terraform Plan
        run: terraform plan
        working-directory: infra
        env:
          TF_VAR_proxmox_url: ${{ secrets.PROXMOX_URL }}
          TF_VAR_proxmox_user: ${{ secrets.PROXMOX_USER }}
          TF_VAR_proxmox_password: ${{ secrets.PROXMOX_PASSWORD }}
          TF_VAR_gateway: ${{ secrets.GATEWAY }}
          TF_VAR_pihole_ip: ${{ secrets.PIHOLE_IP }}
          TF_VAR_docker_host_ip: ${{ secrets.DOCKER_HOST_IP }}
          TF_VAR_ansible_public_key: ${{ secrets.ANSIBLE_SSH_PUBLIC_KEY }}
          TF_VAR_homeassistant_ip: ${{ secrets.HOMEASSISTANT_IP }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
        working-directory: infra
        env:
          TF_VAR_proxmox_url: ${{ secrets.PROXMOX_URL }}
          TF_VAR_proxmox_user: ${{ secrets.PROXMOX_USER }}
          TF_VAR_proxmox_password: ${{ secrets.PROXMOX_PASSWORD }}
          TF_VAR_gateway: ${{ secrets.GATEWAY }}
          TF_VAR_pihole_ip: ${{ secrets.PIHOLE_IP }}
          TF_VAR_docker_host_ip: ${{ secrets.DOCKER_HOST_IP }}
          TF_VAR_ansible_public_key: ${{ secrets.ANSIBLE_SSH_PUBLIC_KEY }}
          TF_VAR_homeassistant_ip: ${{ secrets.HOMEASSISTANT_IP }}

  ansible:
    name: Ansible
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: --accept-routes

      - name: Write inventory
        run: echo "${{ secrets.ANSIBLE_INVENTORY }}" > ansible/inventory/hosts.ini

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/homelab_ansible
          chmod 600 ~/.ssh/homelab_ansible

      - name: Wait for SSH on docker host
        run: |
          IP=$(echo "${{ secrets.DOCKER_HOST_IP }}" | cut -d'/' -f1)
          until ssh-keyscan -T 5 $IP 2>/dev/null | grep -q ssh; do echo "waiting for SSH..."; sleep 5; done
        timeout-minutes: 3

      - name: Install Ansible
        run: pip install ansible

      - name: Run Ansible Playbook
        run: ansible-playbook -i ansible/inventory/hosts.ini ansible/playbooks/docker.yml --private-key ~/.ssh/homelab_ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"